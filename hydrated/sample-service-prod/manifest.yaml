apiVersion: v1
kind: Service
metadata:
  name: sample-service-stable
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: sample-service
---
apiVersion: v1
kind: Service
metadata:
  name: sample-service-canary
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: sample-service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sample-service
spec:
  hostnames:
    - sample.platformlab.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: podinfo
      namespace: podinfo
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: sample-service-stable
          port: 8080
          weight: 100
        - group: ""
          kind: Service
          name: sample-service-canary
          port: 8080
          weight: 0
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  labels:
    app: sample-service
  name: sample-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-service
  strategy:
    canary:
      canaryService: sample-service-canary
      stableService: sample-service-stable
      steps:
        - setWeight: 25
        - pause:
            duration: 60s
        - setWeight: 50
        - pause:
            duration: 60s
        - setWeight: 75
        - pause:
            duration: 60s
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: sample-service
  template:
    metadata:
      labels:
        app: sample-service
    spec:
      containers:
        - image: ghcr.io/platform-engineer-lab/sample-service:d446bfc
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          name: sample-service
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 25m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
