apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
    - name: podinfo
      namespace: podinfo
  hostnames:
    - {{ .Values.hostname }}
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}-stable
          port: {{ .Values.service.port }}
          weight: 100
        - name: {{ .Release.Name }}-canary
          port: {{ .Values.service.port }}
          weight: 0
