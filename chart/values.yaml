image:
  repository: ghcr.io/platform-engineer-lab/sample-service
  tag: c7f727d
  pullPolicy: IfNotPresent
service:
  port: 8080
replicaCount: 1
hostname: ""
probe:
  path: /healthz
  initialDelaySeconds: 5
  periodSeconds: 10
  liveness: false
gateway:
  name: podinfo
  namespace: podinfo
resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
rollout:
  canary:
    steps:
      - setWeight: 50
      - pause:
          duration: 30s
      - setWeight: 100
